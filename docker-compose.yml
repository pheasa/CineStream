services:
  app:
    build: .
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    command: npx tsx watch server.ts
    volumes:
      # - .:/app
      # - /app/node_modules
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"