services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/cinestream
      - NODE_ENV=production
      - VITE_APP_NAME=CineStream
      # Add your AdSense variables here if needed
      - VITE_ADSENSE_CLIENT_ID=ca-pub-XXXXXXXXXXXXXXXX
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cinestream
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cinestream"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
